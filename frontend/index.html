<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-reader-bg="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c10" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="JM Comic Reader — 沉浸式漫画阅读（Cloudflare Worker + GitHub Pages）" />
  <title>JM Reader</title>
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('jm-reader-settings');
        var s = raw ? JSON.parse(raw) : {};
        var theme = s.theme === 'light' ? 'light' : 'dark';
        var rb = s.readerBg;
        if (rb !== 'light' && rb !== 'dark' && rb !== 'match') rb = 'dark';
        var resolved = rb === 'match' ? theme : rb;
        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        root.setAttribute('data-reader-bg', resolved);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'light' ? '#f6f7fb' : '#0b0c10');
      } catch (e) { /* keep defaults */ }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234f46e5'/%3E%3Cpath d='M8 10h16v2.5H8zm0 5h12v2.5H8zm0 5h14v2.5H8z' fill='%23ffffff'/%3E%3C/svg%3E" />
</head>
<body>
  <a class="skip-link" href="#main">跳到主内容</a>

  <!-- Age gate -->
  <div id="age-gate" class="overlay" role="dialog" aria-modal="true" aria-labelledby="age-title" hidden>
    <div class="dialog">
      <div class="dialog-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M12 3l8 4v5c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V7l8-4z"/>
          <path d="M9.5 12.5l1.8 1.8 3.7-3.8"/>
        </svg>
      </div>
      <h1 id="age-title">内容提示</h1>
      <p>本页面仅供个人学习 / 技术演示。内容可能包含成人向漫画。</p>
      <p class="muted">请确认你已年满当地法定成年年龄，并自行承担访问责任。</p>
      <div class="dialog-actions">
        <button type="button" id="age-leave" class="btn ghost">离开</button>
        <button type="button" id="age-enter" class="btn primary">我已成年，进入</button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="overlay" role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden>
    <div class="dialog">
      <div class="dialog-head">
        <h2 id="settings-title">设置</h2>
        <button type="button" id="settings-close" class="icon-btn" aria-label="关闭设置">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>

      <label class="field" for="api-base">
        <span class="field-label">API 地址</span>
        <input id="api-base" type="url" inputmode="url" placeholder="https://jmcomic-api.xxx.workers.dev" autocomplete="off" spellcheck="false" />
      </label>
      <p class="hint">填写已部署的 Cloudflare Worker 地址。前端通过 <code>?jmid=</code> 与 <code>/proxy</code> 调用。</p>
      <label class="check">
        <input id="use-proxy" type="checkbox" checked />
        <span>经 Worker 代理图片（推荐，解决 CDN 跨域）</span>
      </label>

      <hr class="settings-divider" />

      <div class="field">
        <span class="field-label" id="theme-label">界面主题</span>
        <div class="segmented" role="radiogroup" aria-labelledby="theme-label">
          <label>
            <input type="radio" name="theme" value="dark" />
            <span>深色</span>
          </label>
          <label>
            <input type="radio" name="theme" value="light" />
            <span>浅色</span>
          </label>
        </div>
      </div>

      <div class="field">
        <span class="field-label" id="reader-bg-label">阅读背景</span>
        <div class="segmented" role="radiogroup" aria-labelledby="reader-bg-label">
          <label>
            <input type="radio" name="reader-bg" value="dark" />
            <span>深色</span>
          </label>
          <label>
            <input type="radio" name="reader-bg" value="light" />
            <span>浅色</span>
          </label>
          <label>
            <input type="radio" name="reader-bg" value="match" />
            <span>跟随主题</span>
          </label>
        </div>
        <p class="hint" style="margin-top:0.45rem;margin-bottom:0">漫画页周围的 letterbox 底色，与界面主题独立。</p>
      </div>

      <div class="dialog-actions">
        <button type="button" id="settings-cancel" class="btn ghost">取消</button>
        <button type="button" id="settings-save" class="btn primary">保存</button>
      </div>
    </div>
  </div>

  <header class="topbar" id="topbar">
    <button type="button" id="btn-home" class="icon-btn" title="首页" aria-label="首页">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
        <path d="M4 11.5 12 5l8 6.5"/>
        <path d="M7 10.5V19h10v-8.5"/>
      </svg>
    </button>
    <div class="brand" id="brand">
      <span class="brand-mark" aria-hidden="true">JM</span>
      <span class="brand-text">Reader</span>
    </div>
    <div class="topbar-actions">
      <button type="button" id="btn-theme" class="icon-btn" title="切换主题" aria-label="切换为浅色主题">
        <svg class="theme-icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 3v2M12 19v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M3 12h2M19 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
        <svg class="theme-icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <path d="M20 14.5A7.5 7.5 0 1 1 9.5 4 6 6 0 0 0 20 14.5z"/>
        </svg>
      </button>
      <button type="button" id="btn-settings" class="icon-btn" title="设置" aria-label="设置">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="main">
    <!-- Home -->
    <section id="view-home" class="view" aria-label="首页">
      <div class="hero">
        <div class="hero-glow" aria-hidden="true"></div>
        <p class="eyebrow">JM Reader</p>
        <h1>沉浸式漫画阅读</h1>
        <p class="sub">输入禁漫 ID 或链接，解析章节并在浏览器中还原乱序图片。</p>

        <form id="search-form" class="search-row" role="search">
          <label class="sr-only" for="search-input">作品 ID 或链接</label>
          <div class="search-field">
            <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="7"/>
              <path d="M20 20l-3.5-3.5"/>
            </svg>
            <input
              id="search-input"
              type="search"
              inputmode="search"
              placeholder="例如 350234 / JM350234 / 专辑链接"
              enterkeyhint="search"
              autocomplete="off"
              spellcheck="false"
              required
            />
          </div>
          <button type="submit" class="btn primary" id="btn-search">
            <span>打开</span>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M5 12h14M13 6l6 6-6 6"/>
            </svg>
          </button>
        </form>
        <p id="home-error" class="error" role="alert" hidden></p>
        <p class="home-hint">首次使用请在设置中填写 Cloudflare Worker API 地址</p>
      </div>
    </section>

    <!-- Album -->
    <section id="view-album" class="view" aria-label="作品详情" hidden>
      <div class="album-hero">
        <button type="button" id="btn-album-back" class="btn ghost sm">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 6l-6 6 6 6"/></svg>
          返回
        </button>
        <div class="album-meta">
          <p class="eyebrow" id="album-id-label">专辑</p>
          <h1 id="album-title">—</h1>
          <p id="album-authors" class="muted"></p>
          <div id="album-stats" class="stat-row" aria-label="作品数据"></div>
          <div id="album-tags" class="tags"></div>
          <p id="album-desc" class="desc"></p>
        </div>
      </div>
      <div class="section-title">
        <h2>章节列表</h2>
        <span id="chapter-count" class="pill"></span>
      </div>
      <div id="chapter-list" class="chapter-list"></div>
    </section>

    <!-- Reader -->
    <section id="view-reader" class="view view-reader" aria-label="阅读器" hidden>
      <div class="reader-chrome" id="reader-chrome">
        <div class="reader-toolbar">
          <button type="button" id="btn-back-album" class="icon-btn" aria-label="返回目录">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M15 6l-6 6 6 6"/></svg>
          </button>
          <div class="reader-title-wrap">
            <div id="reader-title" class="reader-title">—</div>
            <div id="reader-progress" class="reader-progress muted small">—</div>
          </div>
          <div class="reader-nav">
            <button type="button" id="btn-prev-ch" class="btn ghost sm" aria-label="上一话">上一话</button>
            <button type="button" id="btn-next-ch" class="btn ghost sm" aria-label="下一话">下一话</button>
          </div>
        </div>
      </div>

      <div id="reader-pages" class="reader-pages"></div>

      <div class="reader-footer">
        <button type="button" id="btn-back-album-2" class="btn ghost">返回目录</button>
        <button type="button" id="btn-next-ch-2" class="btn primary">下一话</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <div id="loading" class="loading" hidden aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <span id="loading-text">加载中…</span>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
